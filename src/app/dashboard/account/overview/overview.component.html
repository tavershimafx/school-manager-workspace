<div class="flex-1 overflow-y-auto p-8 space-y-12 max-w-5xl mx-auto w-full">
   <!-- Header -->
   <div class="border-b border-outline-variant/20 pb-6">
      <h1 class="text-2xl font-bold tracking-tight text-on-surface">User Account</h1>
      <p class="text-sm text-on-surface-variant mt-1">Manage your professional profile and security parameters.</p>
   </div>
   <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
      <!-- Section 1: Personal Profile -->
      <section class="lg:col-span-7 space-y-8">
         <div class="flex items-center gap-8">
            <div class="relative group">
               <div class="w-24 h-24 rounded-full overflow-hidden border-2 border-outline-variant/20">
                  <img class="w-full h-full object-cover"
                     data-alt="professional avatar of a person in high key lighting with neutral gray background"
                     [src]="userProfile()?.profilePicture || '/user-profile.png'" />
               </div>
               <button
                  class="absolute inset-0 bg-on-surface/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded-full">
                  <span class="material-symbols-outlined text-white" data-icon="photo_camera">photo_camera</span>
               </button>
            </div>
            <div>
               <h3 class="font-semibold text-on-surface">Profile Picture</h3>
               <p class="text-xs text-on-surface-variant mb-3">PNG, JPG or GIF. Max 1MB.</p>
               <div class="flex gap-2">
                  <button
                     class="px-3 py-1.5 text-xs font-semibold bg-primary text-on-primary rounded-sm hover:bg-primary-container transition-colors">Change
                     Photo</button>
                  <button
                     class="px-3 py-1.5 text-xs font-semibold text-on-surface-variant hover:bg-surface-container-high transition-colors">Remove</button>
               </div>
            </div>
         </div>
         <div class="grid grid-cols-2 gap-4">
            <text-input label="First Name" [disabled]="true" [ngModel]="userProfile()?.firstName"
               [ngModelOptions]="{standalone: true}" [light]="false"></text-input>

            <text-input label="Last Name" [disabled]="true" [ngModel]="userProfile()?.lastName"
               [ngModelOptions]="{standalone: true}" [light]="false"></text-input>


            <div class="col-span-2 space-y-1.5">
               <label class="text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-wider">Email
                  Address</label>
               <div class="relative">
                  <input disabled=""
                     class="w-full bg-surface-container-high border-none text-on-surface-variant/50 rounded-sm text-sm py-2 px-3 cursor-not-allowed"
                     disabled="" type="email" value="{{userProfile()?.email}}" />
                  <span
                     class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded uppercase tracking-tighter">Verified</span>
               </div>
            </div>
            <div class="col-span-2 space-y-1.5">
               <text-input label="Phone Number" [disabled]="true" [ngModel]="userProfile()?.phoneNumber"
                  [ngModelOptions]="{standalone: true}" [light]="false"></text-input>
            </div>
         </div>
      </section>
      <!-- Section 2: Security & Privacy -->
      <section class="lg:col-span-5 space-y-8">
         <!-- Password Card -->
         <form [formGroup]="passForm" (submit)="changePassword()">
            <div class="bg-surface-container-low p-6 rounded-sm border border-outline-variant/10">
               <div class="flex items-center gap-2 mb-4">
                  <span class="material-symbols-outlined text-primary" data-icon="lock_reset">lock_reset</span>
                  <h3 class="font-bold text-sm tracking-tight uppercase">Change Password</h3>
               </div>

               <div class="flex flex-col space-y-4">
                  <text-input label="Current Password" formControlName="oldPassword" type="password" [light]="true"
                     [showValidation]="passwordSubmitting"></text-input>

                  <text-input label="New Password" formControlName="newPassword" type="password" [light]="true"
                     [showValidation]="passwordSubmitting"></text-input>

                  <text-input label="Confirm New Password" formControlName="confirmPassword" type="password"
                     [light]="true" [showValidation]="passwordSubmitting"></text-input>
                  <div class="flex items-center justify-end gap-3 pt-6 border-t border-outline-variant/20">
                     <button type="submit"
                        class="px-6 py-2 text-sm font-semibold bg-primary text-on-primary rounded-sm shadow-sm hover:shadow-md hover:brightness-110 transition-all duration-200">
                        Update</button>
                  </div>
               </div>
            </div>
         </form>
         <!-- 2FA Toggle -->
         <div
            class="bg-surface-container-low p-6 rounded-sm border border-outline-variant/10 flex items-start justify-between">
            <div class="space-y-1">
               <h3 class="font-bold text-sm tracking-tight uppercase">Two-Factor Auth</h3>
               <p class="text-xs text-on-surface-variant leading-relaxed">Secure your account with an extra layer of
                  protection using an authenticator app.</p>
               <span class="inline-block mt-2 text-[10px] font-bold text-primary uppercase">Current Status:
                  Disabled</span>
            </div>
            <label class="relative inline-flex flex-shrink-0 cursor-pointer rounded-full transition-colors duration-200 ease-in-out bg-primary focus:outline-none">
               <input class="sr-only peer" type="checkbox" disabled="" />
               <div
                  class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container">
               </div>
            </label>
         </div>

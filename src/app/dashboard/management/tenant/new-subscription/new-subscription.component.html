<base-modal title="Delete Assessments" module="Student Management" subModule="Reset Student Passwords">
  <!-- Modal Body -->
  <div class="p-6">
    <div class="flex gap-4 items-start">
      <div class="w-10 h-10 bg-error/10 rounded-full flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">warning</span>
      </div>
      <div class="space-y-2">
        <h3 class="text-sm font-bold text-on-surface">Delete Assessments</h3>
        <p class="text-[12px] leading-relaxed text-on-surface-variant">
          You are about to delete <span class="font-bold text-on-surface">0 student assessment record</span>.
          This operation cannot be undone. Are you sure you want to proceed?
        </p>
      </div>
    </div>
  </div>
  <!-- Modal Footer -->
  <div class="px-6 py-4 bg-surface-container-low/50 flex justify-end gap-3 rounded-b-lg">
    <button
      class="px-4 py-1.5 text-xs font-semibold text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-sm border border-outline-variant/30">
      Cancel
    </button>
    <button
      class="px-4 py-1.5 text-xs font-semibold text-white bg-error hover:bg-error/90 shadow-sm active:scale-95 transition-all rounded-sm flex items-center gap-2">
      <span class="material-symbols-outlined text-[16px]">delete</span>
      Delete
    </button>
  </div>
</base-modal>

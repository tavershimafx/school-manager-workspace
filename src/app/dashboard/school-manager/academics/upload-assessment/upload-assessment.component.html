<base-modal title="Reset Student Passwords" module="Student Management" subModule="Reset Student Passwords">
  <!-- Main Form Area -->
  <div class="p-6 space-y-6">
    <!-- Dropdown Grid -->
    <div class="grid grid-cols-2 gap-x-5 gap-y-4">
      <div class="space-y-1.5">
        <label class="block text-[11px] font-semibold text-on-surface-variant tracking-wide uppercase">Subject</label>
        <div class="relative">
          <select
            class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg text-xs py-2 px-3 appearance-none focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all cursor-pointer">
            <option>Mathematics</option>
            <option>Physics</option>
            <option>English Language</option>
            <option>Further Mathematics</option>
          </select>
          <span
            class="material-symbols-outlined absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 text-sm">expand_more</span>
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="block text-[11px] font-semibold text-on-surface-variant tracking-wide uppercase">Class</label>
        <div class="relative">
          <select
            class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg text-xs py-2 px-3 appearance-none focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all cursor-pointer">
            <option>SS3 Alpha</option>
            <option>SS3 Beta</option>
            <option>SS3 Gamma</option>
          </select>
          <span
            class="material-symbols-outlined absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 text-sm">expand_more</span>
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="block text-[11px] font-semibold text-on-surface-variant tracking-wide uppercase">Term</label>
        <div class="relative">
          <select
            class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg text-xs py-2 px-3 appearance-none focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all cursor-pointer">
            <option>First Term</option>
            <option>Second Term</option>
            <option>Third Term</option>
          </select>
          <span
            class="material-symbols-outlined absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 text-sm">expand_more</span>
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="block text-[11px] font-semibold text-on-surface-variant tracking-wide uppercase">Session</label>
        <div class="relative">
          <select
            class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg text-xs py-2 px-3 appearance-none focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all cursor-pointer">
            <option>2023/2024</option>
            <option>2022/2023</option>
          </select>
          <span
            class="material-symbols-outlined absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 text-sm">expand_more</span>
        </div>
      </div>
    </div>
    <!-- Select File Zone -->
    <div class="space-y-2">
      <label class="block text-[11px] font-semibold text-on-surface-variant tracking-wide uppercase">Assessment
        Document</label>
      <div
        class="group relative flex flex-col items-center justify-center border-2 border-dashed border-outline-variant/30 rounded-xl p-10 bg-surface-container-low hover:bg-surface-container hover:border-primary/40 transition-all cursor-pointer">
        <div
          class="mb-4 p-4 rounded-full bg-surface-container-lowest shadow-sm group-hover:scale-110 transition-transform duration-300">
          <img alt="CSV Icon" class="w-12 h-12"
            data-alt="large spreadsheet icon with professional blue accent representing a CSV or Excel file format for academic records"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbbHTWGOtxu7w12OEw_QYzbYxnrm-YYBx6X35NyEF5GJMvhv160s4IMu1qD8PLOnJ5PhK_IoStfxfsDu4s5JsCoXxeaW-IZhLcRFZdOhzf5VFZfJNsBhipBJBHlzwzJ59Wh93ufsEAJojQgMmyHBetsGw2DeFYP86o6lWs1I82-M_i4LqFLq7fhSuelI1sZb3ZEvt88GZVvLQybUBqiI_ctUAPvZE9DnLE7G3KOzMmOrPvteYHuO3QNspTKEjW_R3aWNNu6_nSejPl" />
        </div>
        <div class="text-center">
          <p class="text-sm font-medium text-on-surface">Click to browse or drag and drop</p>
          <p class="text-[11px] text-on-surface-variant mt-1">Supported formats: .csv, .xlsx (Max 10MB)</p>
        </div>
        <div class="mt-6 flex items-center gap-3">
          <button
            class="px-5 py-2 bg-surface-container-lowest border border-outline-variant text-[11px] font-bold uppercase tracking-widest text-on-surface-variant hover:bg-white hover:text-primary hover:border-primary transition-all rounded-lg">
            Browse...
          </button>
          <span class="text-xs text-on-surface-variant italic">No file selected.</span>
        </div>
      </div>
    </div>
  </div>
  <!-- Footer Actions -->
  <div class="px-6 py-4 bg-surface-container-low border-t border-outline-variant/10 flex items-center justify-between">
    <div class="flex items-center gap-2 text-[10px] text-on-surface-variant/70">
      <span class="material-symbols-outlined text-[14px]">info</span>
      <span>Download sample template for accurate formatting</span>
    </div>
    <div class="flex items-center space-x-3">
      <button class="px-5 py-2 text-xs font-semibold text-on-surface-variant hover:text-on-surface transition-colors">
        Cancel
      </button>
      <button
        class="px-6 py-2 bg-primary text-white text-xs font-bold rounded-lg shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-95 transition-all">
        Upload Scores
      </button>
    </div>
  </div>
</base-modal>

<base-modal title="Fee Type" module="Finance" subModule="Fee Type">
  <div class="p-6">
    <h2 class="text-lg font-bold text-on-surface mb-6">Add New Fee Type</h2>
    <div class="grid grid-cols-2 gap-4">
      <!-- Row 1 -->
      <div class="col-span-2">
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Name</label>
        <input
          class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none"
          type="text" value="2025 First Term fees" />
      </div>
      <!-- Row 2 -->
      <div class="col-span-2">
        <label
          class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Description</label>
        <textarea
          class="w-full h-20 bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none resize-none"
          placeholder="Enter detailed fee description..."></textarea>
      </div>
      <!-- Row 3 -->
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Amount</label>
        <div class="relative">
          <span class="absolute left-3 top-2 text-xs text-on-surface-variant">$</span>
          <input
            class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm pl-7 pr-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none"
            type="text" value="5000" />
        </div>
      </div>
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Late
          Fee</label>
        <div class="relative">
          <span class="absolute left-3 top-2 text-xs text-on-surface-variant">$</span>
          <input
            class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm pl-7 pr-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none"
            type="text" value="500" />
        </div>
      </div>
      <!-- Row 4 -->
      <div>
        <label
          class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Deadline</label>
        <div class="relative">
          <input
            class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none"
            type="text" value="03/30/2026" />
          <span class="absolute right-3 top-2 material-symbols-outlined text-on-surface-variant text-sm"
            data-icon="calendar_today">calendar_today</span>
        </div>
      </div>
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Payment
          Code/Identifier</label>
        <input
          class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none"
          type="text" value="FT-2025-001" />
      </div>
      <!-- Row 5 -->
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Session</label>
        <select
          class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none appearance-none">
          <option selected="">2025/2026</option>
          <option>2024/2025</option>
        </select>
      </div>
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Term</label>
        <select
          class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none appearance-none">
          <option selected="">First</option>
          <option>Second</option>
          <option>Third</option>
        </select>
      </div>
      <!-- Row 6 -->
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Connected
          Bank</label>
        <select
          class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none appearance-none">
          <option selected="">DASHBOARD BANK CONNECTION</option>
          <option>INTERNAL LEDGER</option>
        </select>
      </div>
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Status</label>
        <select
          class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none appearance-none">
          <option selected="">Active</option>
          <option>Inactive</option>
          <option>Draft</option>
        </select>
      </div>
      <!-- Row 7 -->
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">User
          Type</label>
        <select
          class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none appearance-none">
          <option selected="">Student</option>
          <option>Staff</option>
          <option>Vendor</option>
        </select>
      </div>
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1 tracking-wider">Invoice
          Priority</label>
        <select
          class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-sm px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none appearance-none">
          <option>Low</option>
          <option selected="">Medium</option>
          <option>High</option>
          <option>Critical</option>
        </select>
      </div>
      <!-- Row 8 -->
      <div class="col-span-2 flex items-center gap-2 mt-2">
        <input checked=""
          class="rounded-sm border-outline-variant text-primary focus:ring-primary w-4 h-4 cursor-pointer"
          id="create-invoice" type="checkbox" />
        <label class="text-xs text-on-surface-variant font-medium cursor-pointer" for="create-invoice">Create
          invoice for all concerned user types?</label>
      </div>
    </div>
  </div>
  <!-- Modal Footer -->
  <div class="bg-surface-container px-6 py-4 flex justify-end gap-3 border-t border-outline-variant/20">
    <button
      class="px-5 py-2 text-[11px] font-bold text-on-surface-variant hover:bg-surface-dim transition-colors rounded-sm">
      Cancel
    </button>
    <button
      class="px-5 py-2 text-[11px] font-bold bg-primary text-white hover:bg-primary-container transition-all active:scale-95 rounded-sm">
      Continue
    </button>
  </div>
</base-modal>

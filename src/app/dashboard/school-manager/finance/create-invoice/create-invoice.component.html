<base-modal title="New Invoice" module="Finance" subModule="Invoice">
  <div class="p-5 space-y-5">
    <!-- Searchable Student Selection -->
    <div class="space-y-1.5">
      <label class="block text-[11px] font-semibold text-on-surface-variant uppercase tracking-wider">Student
        Selection</label>
      <div class="relative group">
        <span
          class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant">person_search</span>
        <input
          class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-sm pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-outline-variant"
          placeholder="Search student by name or ID..." type="text" />
        <div
          class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-outline px-1.5 py-0.5 bg-surface-container-high rounded border border-outline-variant/20">
          Ctrl + K</div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <!-- Fee Type -->
      <div class="space-y-1.5">
        <label class="block text-[11px] font-semibold text-on-surface-variant uppercase tracking-wider">Fee
          Type</label>
        <select
          class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-sm px-3 py-2 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary">
          <option value="">Select category...</option>
          <option value="tuition">Tuition Fee</option>
          <option value="lab">Laboratory Fee</option>
          <option value="library">Library Resources</option>
          <option value="sports">Athletics/Sports</option>
          <option value="misc">Miscellaneous</option>
        </select>
      </div>
      <!-- Amount -->
      <div class="space-y-1.5">
        <label class="block text-[11px] font-semibold text-on-surface-variant uppercase tracking-wider">Amount
          (USD)</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs font-medium text-on-surface-variant">$</span>
          <input
            class="w-full bg-surface-container-low border border-outline-variant/30 rounded-sm pl-6 pr-3 py-2 text-sm text-on-surface font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary"
            placeholder="0.00" step="0.01" type="number" />
        </div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <!-- Due Date -->
      <div class="space-y-1.5">
        <label class="block text-[11px] font-semibold text-on-surface-variant uppercase tracking-wider">Due
          Date</label>
        <div class="relative">
          <span
            class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant">calendar_today</span>
          <input
            class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-sm pl-10 pr-3 py-2 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary"
            type="date" />
        </div>
      </div>
      <!-- Payment Method -->
      <div class="space-y-1.5">
        <label class="block text-[11px] font-semibold text-on-surface-variant uppercase tracking-wider">Payment
          Method (Optional)</label>
        <select
          class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-sm px-3 py-2 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary">
          <option value="none">Not specified</option>
          <option value="bank">Bank Transfer</option>
          <option value="credit">Credit/Debit Card</option>
          <option value="cash">Cash Office</option>
        </select>
      </div>
    </div>
    <!-- Description -->
    <div class="space-y-1.5">
      <label
        class="block text-[11px] font-semibold text-on-surface-variant uppercase tracking-wider">Description</label>
      <textarea
        class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-sm px-3 py-2 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary resize-none"
        placeholder="Enter line items or additional details regarding this invoice..." rows="3"></textarea>
    </div>
    <!-- Subtle Info Callout -->
    <div class="flex gap-3 p-3 bg-primary-fixed/30 rounded-sm border border-primary/10">
      <span class="material-symbols-outlined text-primary-fixed-dim" data-weight="fill">info</span>
      <p class="text-[11px] text-on-primary-fixed-variant leading-relaxed">
        Invoices created will be immediately available in the student portal. An automated notification will be sent
        to the registered email address.
      </p>
    </div>
  </div>
  <!-- Modal Actions -->
  <div
    class="flex items-center justify-end gap-3 px-5 py-4 bg-surface-container-low border-t border-outline-variant/10">
    <button
      class="px-4 py-2 text-xs font-semibold text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-sm">
      Cancel
    </button>
    <button
      class="flex items-center gap-2 px-5 py-2 text-xs font-semibold bg-gradient-to-b from-primary to-primary-container text-white rounded-sm shadow-sm hover:brightness-105 active:scale-[0.98] transition-all">
      <span class="material-symbols-outlined !text-[14px]">save</span>
      Create Invoice
    </button>
  </div>
</base-modal>

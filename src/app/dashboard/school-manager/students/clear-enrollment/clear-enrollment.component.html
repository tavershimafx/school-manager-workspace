<base-modal title="Reset Student Passwords" module="Student Management" subModule="Reset Student Passwords">
 <!-- Modal Body -->
      <div class="p-6 space-y-6">
        <!-- Info Alert -->
        <div class="flex gap-3 bg-primary/5 p-4 rounded border border-primary/10">
          <span class="material-symbols-outlined text-primary text-xl" data-weight="fill">info</span>
          <p class="text-[0.8125rem] text-on-surface leading-snug">
            Clear student enrollment numbers to uniquely reassign using a different strategy. This action is permanent
            for the selected scope.
          </p>
        </div>
        <!-- Toggle Section -->
        <div
          class="flex items-center justify-between p-4 bg-surface-container-low rounded border border-outline-variant/10">
          <div class="flex flex-col">
            <span class="text-[0.8125rem] font-semibold text-on-surface">Toggle on to clear for all classes</span>
            <span class="text-[0.6875rem] text-on-surface-variant">Apply this action to the entire school
              database.</span>
          </div>
          <!-- Switch -->
          <label class="relative inline-flex items-center cursor-pointer">
            <input class="sr-only peer" type="checkbox" />
            <div
              class="w-9 h-5 bg-outline-variant rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary">
            </div>
          </label>
        </div>
        <!-- Target Class Dropdown -->
        <div class="space-y-1.5">
          <label class="text-[0.6875rem] font-bold text-on-surface-variant tracking-wider uppercase">TARGET
            CLASS</label>
          <div class="relative">
            <select
              class="w-full h-10 px-3 bg-surface-container-lowest border border-outline-variant/30 rounded text-sm text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all">
              <option disabled="" selected="" value="">Select Class</option>
              <option value="1">Grade 1 - Section A</option>
              <option value="2">Grade 2 - Section B</option>
              <option value="3">Grade 3 - Section A</option>
              <option value="4">Grade 4 - Section C</option>
            </select>
            <span
              class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">unfold_more</span>
          </div>
        </div>
      </div>
      <!-- Modal Actions -->
      <div
        class="px-6 py-4 bg-surface-container-low flex items-center justify-end gap-3 border-t border-outline-variant/15">
        <button
          class="px-5 py-2 text-[0.8125rem] font-semibold text-on-surface-variant hover:bg-surface-container-high rounded transition-colors">
          Cancel
        </button>
        <button
          class="px-6 py-2 bg-error text-on-error text-[0.8125rem] font-bold rounded hover:brightness-110 active:scale-[0.98] transition-all flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">delete_sweep</span>
          Clear Numbers
        </button>
      </div>
</base-modal>

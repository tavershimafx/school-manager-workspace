<base-modal title="Reset Student Passwords" module="Student Management" subModule="Reset Student Passwords">
   <!-- Modal Content -->
      <div class="p-6">
        <!-- Instruction Area -->
        <div class="flex gap-4 p-4 bg-primary/5 border border-primary/10 rounded-sm mb-6">
          <div class="mt-0.5">
            <span class="material-symbols-outlined text-primary text-[20px]">info</span>
          </div>
          <div class="text-[12px] leading-relaxed text-on-surface-variant">
            Select the class you wish to reset its student passwords. Their <span
              class="font-bold text-on-surface">Enrollment number</span> will now be used as their default password.
          </div>
        </div>
        <!-- Form -->
        <div class="space-y-4">
          <div class="flex flex-col gap-1.5">
            <label class="text-[11px] font-bold text-on-surface-variant flex items-center gap-1" for="class-select">
              Class <span class="text-error">*</span>
            </label>
            <div class="relative">
              <select
                class="w-full h-10 pl-3 pr-10 bg-surface-container-lowest border border-outline-variant/40 rounded-sm text-[12px] text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all appearance-none cursor-pointer"
                id="class-select">
                <option disabled="" selected="" value="">Select a class...</option>
                <option value="g10a">Grade 10-A</option>
                <option value="g10b">Grade 10-B</option>
                <option value="g11a">Grade 11-A</option>
                <option value="g11b">Grade 11-B</option>
                <option value="g12a">Grade 12-A</option>
                <option value="g12b">Grade 12-B</option>
              </select>
              <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none">
                <span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
              </div>
            </div>
          </div>
        </div>
        <!-- Warning Message (Implicit architectural precision) -->
        <p class="mt-4 text-[10px] text-outline italic">
          Note: This action cannot be undone. Affected students will be notified upon their next login attempt.
        </p>
      </div>
      <!-- Modal Footer -->
      <div
        class="flex items-center justify-end gap-3 px-6 py-4 bg-surface-container-low/50 border-t border-outline-variant/20">
        <button
          class="px-5 h-9 text-[11px] font-semibold text-on-surface-variant bg-surface-container-high hover:bg-surface-dim transition-colors rounded-sm">
          Cancel
        </button>
        <button
          class="px-6 h-9 text-[11px] font-bold text-white bg-gradient-to-b from-primary to-primary-container hover:shadow-md active:scale-95 transition-all rounded-sm">
          Continue
        </button>
      </div>
</base-modal>

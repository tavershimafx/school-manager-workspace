<!-- Modal Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center glass-overlay overflow-y-auto">
   <!-- Modal Dialog -->
   <div
      class="bg-surface-bright w-full max-w-[540px] rounded-lg shadow-[0px_8px_24px_rgba(26,28,28,0.12)] border border-outline-variant/20 overflow-hidden">
      <!-- Modal Header -->
      <div class="px-6 py-4 flex flex-col gap-1 border-b border-outline-variant/10">
         <div class="flex justify-between items-start">
            <div>
               <div
                  class="flex items-center gap-1.5 text-[10px] font-medium text-on-surface-variant uppercase tracking-wider mb-1">
                  <span>{{module}}</span>
                  <span class="material-symbols-outlined text-[12px]" data-icon="chevron_right">chevron_right</span>
                  <span class="text-primary">{{subModule}}</span>
               </div>
               <h2 class="text-lg font-bold text-on-surface tracking-tight">{{title}}</h2>
            </div>
            <button (click)="closeDialog()"
               class="text-on-surface-variant hover:text-on-surface p-1 rounded-full hover:bg-surface-container transition-colors">
               <span class="material-symbols-outlined" data-icon="close">close</span>
            </button>
         </div>
      </div>
      <ng-content></ng-content>
   </div>
</div>

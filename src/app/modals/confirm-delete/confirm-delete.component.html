<base-modal title="Delete item" description="Review full item specifications to confirm delete operation."
  icon="upload_file">
    <div class="p-8">
      <!-- Warning Icon and Header Section -->
      <div class="flex flex-col items-center text-center">
        <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-6">
          <!-- Warning Icon (Red Exclamation) -->
          <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewbox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
              stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
          </svg>
        </div>
        <h3 class="text-xl font-bold text-neutral-800 mb-2" id="modal-title">Confirm Deletion</h3>
        <p class="text-neutral-500 leading-relaxed">
          Are you sure you want to delete {{data?.item}}? This action is permanent and <span
            class="font-semibold text-neutral-700">cannot be undone</span>.
        </p>
      </div>
    </div>
    <!-- Action Buttons -->
    <div class="bg-neutral-50 px-8 py-6 flex flex-col sm:flex-row-reverse gap-3 border-t border-neutral-100">
      <button (click)="confirm()"
        class="w-full sm:w-auto px-6 py-2.5 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2"
        data-purpose="confirm-delete-btn" type="button">
        Delete Record
      </button>
      <button
        class="w-full sm:w-auto px-6 py-2.5 bg-white border border-neutral-300 hover:bg-neutral-50 text-neutral-700 font-semibold rounded-lg shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-neutral-400 focus:ring-offset-2"
        data-purpose="cancel-btn" (click)="closeDialog(false)" type="button">
        Cancel
      </button>
    </div>
</base-modal>

<div class="fixed inset-0 bg-on-background/30 backdrop-blur-sm z-40 flex items-center justify-center p-4">
  <div class="relative z-50 w-full max-w-md animate-in fade-in zoom-in duration-300">
    <div class="surface-container-lowest rounded-xl ambient-shadow overflow-hidden flex flex-col bg-white">
      <!-- Header Component -->
      <div class="flex items-center justify-between px-6 py-5">
        <h2 class="font-headline text-xl font-bold text-on-surface tracking-tight">{{data?.title}}</h2>
        <button (click)="closeDialog(false)"
          class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface-variant">
          <span class="material-symbols-outlined" data-icon="close">close</span>
        </button>
      </div>
      <!-- Content Body -->
      <div class="px-6 py-2 space-y-6">
        <!-- Visual Warning Icon (Academic Curator Style) -->
        <div class="flex justify-center py-4">
          <div class="w-20 h-20 rounded-full bg-error-container/30 flex items-center justify-center">
            <span class="material-symbols-outlined text-error text-5xl" data-icon="delete_forever"
              style="font-variation-settings: 'FILL' 1;">warning</span>
          </div>
        </div>
        <div class="space-y-4 text-center">
          <p class="text-on-surface-variant leading-relaxed text-sm">
            <span class="font-bold text-on-surface">{{data?.message}}</span>.
          </p>
          <p class="text-error font-bold text-lg font-headline tracking-tight">
            Are you sure you want to proceed?
          </p>
        </div>
      </div>
      <!-- Action Footer -->
      <div class="p-6 mt-4 flex flex-col gap-3">
        <button (click)="closeDialog(false)"
          class="w-full py-3.5 px-6 rounded-lg font-bold text-error border-2 border-error/10 hover:bg-error/5 transition-all duration-200 active:scale-[0.98]">
          Cancel
        </button>
        <button (click)="confirm()"
          class="w-full py-4 px-6 rounded-lg font-bold text-white bg-error shadow-lg shadow-error/20 hover:brightness-110 transition-all duration-200 active:scale-[0.98]">
          Proceed
        </button>
      </div>
    </div>
    <!-- Bottom Safe Area Spacer for Mobile -->
    <div class="h-8 md:hidden"></div>
  </div>
</div>

<base-modal title="Import Students" description="Select student file to add to the database collection"
   icon="upload_file">
   <!-- Body -->
   <div class="p-6 space-y-6">
      <!-- Drop Zone -->
      <div (click)="openSelect()" class="border-2 border-dashed {{isSubmitting && !selectedFile? 'border-danger-600 hover:bg-danger-50 hover:border-danger-600' : 'border-neutral-200 hover:bg-neutral-100 hover:border-primary-300'}}
                    rounded-xl bg-neutral-50 p-10 flex flex-col items-center justify-center 
                    text-center cursor-pointer transition-all group">
         <div
            class="w-16 h-16 rounded-full bg-white shadow-sm flex items-center justify-center text-neutral-400 group-hover:text-primary-600 mb-4 transition-colors">
            <span class="material-symbols-outlined text-4xl">cloud_upload</span>
         </div>
         <h4 class="font-semibold text-neutral-800">Click to upload or drag and drop</h4>
         <p class="text-sm text-neutral-500 mt-1">Supporting formats: <span
               class="font-mono text-primary-600">CSV</span></p>
         <p class="text-xs text-neutral-400 mt-2">Maximum file size: 15MB</p>
      </div>
      <!-- Selected Files List -->
      <div>
         <h5 class="text-xs font-bold text-neutral-500 uppercase tracking-wider mb-3">Selected Files ({{selectedFile?
            '1' : '0'}})</h5>
         <div class="space-y-2">
            <!-- File Item 1 -->
            @if(selectedFile){
            <div
               class="flex items-center justify-between p-3 bg-white border border-neutral-200 rounded-lg group hover:border-primary-200">
               <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded bg-orange-100 text-orange-600 flex items-center justify-center">
                     <span class="material-symbols-outlined text-xl">description</span>
                  </div>
                  <div>
                     <p class="text-sm font-medium text-neutral-900">{{selectedFile.name}}</p>
                     <p class="text-xs text-neutral-500">{{getSize(selectedFile.size)}}</p>
                  </div>
               </div>
               <button class="text-neutral-400 hover:text-red-500 transition-colors" (click)="removeFile()">
                  <span class="material-symbols-outlined">delete</span>
               </button>
            </div>
            }
         </div>
      </div>
   </div>
   <!-- Footer -->
   <div class="px-6 py-4 bg-neutral-50 border-t border-neutral-100 flex items-center justify-end gap-3">
      <button (click)="closeDialog()"
         class="px-4 py-2 text-sm font-semibold text-neutral-600 hover:text-neutral-800 bg-white border border-neutral-200 rounded-lg shadow-sm">
         Cancel
      </button>
      <button (click)="uploadFile()"
         class="px-6 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg shadow-sm flex items-center gap-2">
         @if(isUploading){
            <span class="material-symbols-outlined text-sm animate-spin" style="font-variation-settings: 'FILL' 1;">donut_large</span>
         }@else {
            <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">cloud_upload</span>
         Upload
         }
         
      </button>
   </div>
   <input type="file" class="hidden" (change)="onFileSelected($event)" #fileInput>
</base-modal>

<div class="bg-surface text-on-surface min-h-screen flex flex-col architect-bg">
  <!-- TopAppBar (Suppressed Shell for focused task) -->
  <header
    class="bg-[#f9f9f9] dark:bg-[#1a1c1c] border-b border-[#c0c7d3]/15 flex justify-between items-center w-full px-6 py-4 fixed top-0 z-50">
    <div class="flex items-center gap-2">
      <span class="text-lg font-bold tracking-tighter text-[#0061a3] dark:text-[#4dabff]">Rushcoq Workspace</span>
    </div>
    <div class="flex items-center gap-4">
      <button
        class="text-[#404751] dark:text-[#c0c7d3] hover:bg-[#f3f3f3] dark:hover:bg-[#2a2d2d] transition-colors duration-200 p-2 rounded-sm flex items-center justify-center scale-95 active:scale-100 transition-transform">
        <span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
      </button>
    </div>
  </header>
  <!-- Main Content Canvas -->
  <main class="flex-grow flex items-center justify-center px-4 pt-16 pb-6">
    <div class="w-full max-w-[420px]">
      <!-- Centralized Recovery Card -->
      <div
        class="bg-surface-container-lowest border border-outline-variant/15 p-8 shadow-[0px_8px_24px_rgba(26,28,28,0.04)] relative overflow-hidden">
        <!-- Precision Accent -->
        <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-primary to-primary-container"></div>
        <div class="mb-8">
          <h1 class="text-on-surface text-xl font-bold tracking-tight mb-2">Reset Password</h1>
          <p class="text-on-surface-variant text-sm leading-relaxed">
            Enter the email address associated with your account and we'll send you a precision link to reset your
            workspace credentials.
          </p>
        </div>
        <form class="space-y-6">
          <!-- Email Input Field -->
          <div class="space-y-1.5">
            <label class="block text-[11px] font-semibold uppercase tracking-widest text-on-surface-variant"
              for="email">
              Developer Email
            </label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-outline text-sm"
                  data-icon="alternate_email">alternate_email</span>
              </div>
              <input
                class="block w-full pl-10 pr-4 py-2.5 bg-surface-container-lowest border border-outline-variant/30 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 placeholder:text-outline/50"
                id="email" name="email" placeholder="name@company.com" required="" type="email" />
            </div>
          </div>
          <!-- Send Reset Link Button -->
          <button
            class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-2.5 px-4 text-sm font-semibold rounded-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm"
            type="submit">
            <span>Send Reset Link</span>
            <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
          </button>
        </form>
        <!-- Back to Login Secondary Action -->
        <div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
          <a class="inline-flex items-center gap-2 text-sm text-primary font-medium hover:underline decoration-2 underline-offset-4 transition-all group"
            routerLink="/">
            <span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1"
              data-icon="arrow_back">arrow_back</span>
            <span>Back to Login</span>
          </a>
        </div>
      </div>
    </div>
  </main>
  <nolayout-footer></nolayout-footer>
</div>

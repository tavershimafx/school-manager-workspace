<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body">
  <!-- TopAppBar -->
  <header
    class="bg-[#f9f9f9] dark:bg-[#1a1c1c] font-['Inter'] antialiased text-sm tracking-tight docked full-width top-0 border-b border-[#c0c7d3]/15 flat no shadows flex justify-between items-center w-full px-6 py-2 z-50">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-[#0061a3] dark:text-[#4dabff]"
        style="font-variation-settings: 'FILL' 1;">architecture</span>
      <span class="text-lg font-bold tracking-tighter text-[#0061a3] dark:text-[#4dabff]">Rushcoq Workspace</span>
    </div>
  </header>
  <!-- Main Canvas -->
  <main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Background Architectural Elements (Visual Only) -->
    <div class="absolute inset-0 z-0 pointer-events-none opacity-20">
      <div class="absolute top-0 left-1/4 w-px h-full bg-outline-variant/15"></div>
      <div class="absolute top-1/3 left-0 w-full h-px bg-outline-variant/15"></div>
      <div class="absolute bottom-1/4 right-1/4 w-64 h-64 border border-outline-variant/10 rounded-full"></div>
    </div>
    <!-- Reset Password Card -->
    <section class="w-full max-w-md z-10">
      <div
        class="bg-surface-container-lowest rounded-sm p-8 border border-outline-variant/15 shadow-[0px_8px_24px_rgba(26,28,28,0.06)] relative overflow-hidden">
        <!-- Top Accent Line -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container"></div>
        <!-- Identity/Header -->
        <div class="mb-8">
          <h1 class="text-xl font-bold tracking-tight text-on-surface mb-2">Reset Password</h1>
          <p class="text-on-surface-variant text-xs leading-relaxed">
            Precision security is paramount. Define your new architectural credentials below.
          </p>
        </div>
        <!-- Form -->
        <form class="space-y-6">
          <!-- New Password Field -->
          <div class="space-y-1.5">
            <label class="block text-[0.6875rem] font-semibold uppercase tracking-widest text-on-surface-variant"
              for="new-password">
              New Password
            </label>
            <div class="relative group">
              <input
                class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-sm px-3 py-2.5 text-sm transition-all outline-none placeholder:text-outline/40"
                id="new-password" name="new-password" placeholder="••••••••••••" type="password" />
              <button
                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors"
                type="button">
                <span class="material-symbols-outlined text-[18px]">visibility</span>
              </button>
            </div>
          </div>
          <!-- Confirm Password Field -->
          <div class="space-y-1.5">
            <label class="block text-[0.6875rem] font-semibold uppercase tracking-widest text-on-surface-variant"
              for="confirm-password">
              Confirm Password
            </label>
            <div class="relative group">
              <input
                class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-sm px-3 py-2.5 text-sm transition-all outline-none placeholder:text-outline/40"
                id="confirm-password" name="confirm-password" placeholder="••••••••••••" type="password" />
              <button
                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors"
                type="button">
                <span class="material-symbols-outlined text-[18px]">visibility</span>
              </button>
            </div>
          </div>
          <!-- Password Requirements Visual Guide -->
          <div class="bg-surface-container rounded-sm p-3 space-y-2">
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-[14px] text-primary"
                style="font-variation-settings: 'FILL' 1;">check_circle</span>
              <span class="text-[10px] text-on-surface-variant font-medium tracking-wide">Min. 12 Characters</span>
            </div>
            <div class="flex items-center gap-2 opacity-50">
              <span class="material-symbols-outlined text-[14px]">circle</span>
              <span class="text-[10px] text-on-surface-variant font-medium tracking-wide">Include 1 Symbol</span>
            </div>
          </div>
          <!-- Action Button -->
          <button
            class="w-full py-3 px-4 bg-gradient-to-r from-primary to-primary-container text-white text-[0.6875rem] font-bold uppercase tracking-[0.15em] rounded-sm hover:brightness-110 active:scale-[0.98] transition-all shadow-sm"
            type="submit">
            Reset Password
          </button>
        </form>
        <!-- Auxiliary Action -->
        <div class="mt-8 text-center">
          <a class="text-[0.6875rem] font-bold text-primary hover:underline uppercase tracking-widest transition-all"
            routerLink="/">
            Return to Login
          </a>
        </div>
      </div>
    </section>
  </main>
  <!-- Footer -->
  <nolayout-footer></nolayout-footer>
</body>
